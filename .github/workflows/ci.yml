name: CFR V&V Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  vv-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v3

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── 3. Create output directory ───────────────────────────────────────────
      - name: Create output directory
        run: mkdir -p output

      # ── Task 1a: Generate requirements.json ──────────────────────────────────
      - name: "Task 1a – Generate requirements.json"
        run: |
          python scripts/generate_requirements.py \
            -i "Input CFR File/21_CFR_117.130.md" \
            -o "output/requirements.json" \
            -c "21 CFR 117.130"

      # ── Task 1b: Generate expected_structure.json (10 selected rules) ─────────
      - name: "Task 1b – Generate expected_structure.json"
        run: |
          python scripts/generate_expected_structure.py \
            -i "output/requirements.json" \
            -o "output/expected_structure.json" \
            -s \
              REQ-117.130-001A \
              REQ-117.130-001B \
              REQ-117.130-001C \
              REQ-117.130-002A \
              REQ-117.130-002B \
              REQ-117.130-002C \
              REQ-117.130-003A \
              REQ-117.130-003A1 \
              REQ-117.130-003B \
              REQ-117.130-003B1

      # ── Task 2: Generate test_cases.json ─────────────────────────────────────
      - name: "Task 2 – Generate test_cases.json"
        run: |
          python scripts/generate_test_cases.py \
            -r "output/requirements.json" \
            -s "output/expected_structure.json" \
            -o "output/test_cases.json"

      # ── Task 3a: Verify requirements ─────────────────────────────────────────
      - name: "Task 3a – Verify requirements"
        run: |
          python scripts/verify.py \
            -r "output/requirements.json" \
            -s "output/expected_structure.json"

      # ── Task 3b: Validate test cases ─────────────────────────────────────────
      - name: "Task 3b – Validate test cases"
        run: |
          python scripts/validate.py \
            -t "output/test_cases.json" \
            -s "output/expected_structure.json"

      # ── Upload all outputs as GitHub artifact ────────────────────────────────
      - name: Upload V&V outputs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vv-outputs
          path: output/