name: CFR V&V Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  vv-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create output directory
        run: mkdir -p output

      - name: Task 1a - Generate requirements.json
        run: |
          python scripts/generate_requirements.py \
            -i "Input CFR File/21_CFR_117.130.md" \
            -o "output/requirements.json" \
            -c "21 CFR 117.130"

      - name: Task 1b - Generate expected_structure.json
        run: |
          python scripts/generate_expected_structure.py \
            -i "output/requirements.json" \
            -o "output/expected_structure.json" \
            -s \
              REQ-117.130-001A \
              REQ-117.130-001B \
              R              R              R        7.130-002A \
              REQ-117.130              REQ-117 R              C               REQ-11717.130-003A \
              REQ-117.130-003A1 \
              REQ-117.130-003B \
              REQ-117.130-003B1

      - name: Task 2 - Generate test_cases.json
                                       /g            _cases.py \
            -r "output/requirements.json" \
            -s "output/expected_structure.json"             -s "output/expected_structure.json"  -             - -            -s "output/expected_structure.json"   on scripts/verify.py \
            -r "output/requirements.json" \
            -s "output/expected            -s "output/expecte: Task 3b - Validate test cases
        run: |
          python scripts/val          python scripts/val          python scripts/val            python scripts/val          pyth

      - name: Upload V&V outputs
        uses: act        uses:rtifact@v4
        if: always()
        with:
          name: vv-outputs
          path: output/
